<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    /* ── AUTH ── */
    .auth-box {
      padding: 36px 32px;
    }

    .auth-box h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 6px;
    }

    .auth-box p.subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: #4f46e5; }

    .btn-primary {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #6b7280;
    }

    .auth-switch a {
      color: #4f46e5;
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
    }

    .auth-switch a:hover { text-decoration: underline; }

    .notice {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 8px;
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    /* ── APP ── */
    .app-box { display: none; }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left h1 { font-size: 20px; font-weight: 600; }
    .header-left p { font-size: 12px; opacity: 0.7; margin-top: 2px; }

    .logout-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .logout-btn:hover { background: rgba(255,255,255,0.25); }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4f46e5; }

    .input-area button {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover { background: #4338ca; }
    .input-area button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .error-bar {
      background: #fef2f2;
      color: #dc2626;
      font-size: 12px;
      padding: 8px 20px;
      display: none;
    }

    .filters {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      padding: 5px 12px;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .todo-list { list-style: none; min-height: 60px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    .todo-item:hover { background: #f9fafb; }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #111827;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .edit-btn, .delete-btn {
      background: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 5px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
      color: #d1d5db;
    }

    .edit-btn:hover { color: #4f46e5; }
    .delete-btn:hover { color: #ef4444; }

    .todo-item.editing .todo-text { display: none; }
    .todo-item:not(.editing) .edit-input { display: none; }

    .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid #4f46e5;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      color: #111827;
    }

    .app-footer {
      padding: 12px 20px;
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #9ca3af;
      cursor: pointer;
      text-decoration: underline;
    }

    .clear-btn:hover { color: #ef4444; }

    .empty, .loading {
      text-align: center;
      padding: 32px;
      color: #d1d5db;
      font-size: 14px;
    }

    .loading { color: #9ca3af; }
  </style>
</head>
<body>
<div class="container">

  <!-- AUTH -->
  <div class="auth-box" id="authBox">
    <h1 id="authTitle">Giriş Yap</h1>
    <p class="subtitle" id="authSubtitle">Yapılacaklar listene devam et</p>

    <div class="error-msg" id="authError"></div>
    <div id="noticeBox"></div>

    <div id="authForm">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="authEmail" placeholder="ornek@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="authPassword" placeholder="En az 6 karakter" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="authSubmit" onclick="submitAuth()">Giriş Yap</button>
    </div>

    <div class="auth-switch">
      <span id="authSwitchText">Hesabın yok mu?</span>
      <a onclick="toggleMode()">Kayıt Ol</a>
    </div>
  </div>

  <!-- APP -->
  <div class="app-box" id="appBox">
    <div class="header">
      <div class="header-left">
        <h1>Yapılacaklar</h1>
        <p id="userEmail"></p>
      </div>
      <button class="logout-btn" onclick="logout()">Çıkış</button>
    </div>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="200">
      <button id="addBtn" onclick="addTodo()">Ekle</button>
    </div>

    <div class="error-bar" id="errorBar"></div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Aktif</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todoList"><li class="loading">Yükleniyor...</li></ul>

    <div class="app-footer">
      <span id="remaining"></span>
      <button class="clear-btn" onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://ucpnijiudrqzlrsoynem.supabase.co';
  const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjcG5paml1ZHJxemxyc295bmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjEyNjQsImV4cCI6MjA5MjMzNzI2NH0.MwlCQtLROebBJOySQkQu44PhWfsnDMrn_5TLpSG4UD8';

  let session = null;
  let todos = [];
  let filter = 'all';
  let isRegister = false;

  /* ── helpers ── */
  function authHeaders(token) {
    return {
      'Content-Type': 'application/json',
      'apikey': ANON_KEY,
      'Authorization': `Bearer ${token}`
    };
  }

  async function supabase(method, path, body, token) {
    const res = await fetch(`${SUPABASE_URL}${path}`, {
      method,
      headers: {
        ...authHeaders(token || ANON_KEY),
        'Prefer': 'return=representation'
      },
      body: body ? JSON.stringify(body) : null
    });
    const text = await res.text();
    const data = text ? JSON.parse(text) : null;
    if (!res.ok) throw new Error(data?.error_description || data?.message || data?.msg || res.status);
    return data;
  }

  /* ── session persistence ── */
  function saveSession(s) {
    session = s;
    if (s) localStorage.setItem('sb_session', JSON.stringify(s));
    else localStorage.removeItem('sb_session');
  }

  function loadSession() {
    try { return JSON.parse(localStorage.getItem('sb_session')); } catch { return null; }
  }

  /* ── auth ── */
  function toggleMode() {
    isRegister = !isRegister;
    document.getElementById('authTitle').textContent = isRegister ? 'Kayıt Ol' : 'Giriş Yap';
    document.getElementById('authSubtitle').textContent = isRegister
      ? 'Yeni bir hesap oluştur' : 'Yapılacaklar listene devam et';
    document.getElementById('authSubmit').textContent = isRegister ? 'Kayıt Ol' : 'Giriş Yap';
    document.getElementById('authSwitchText').textContent = isRegister
      ? 'Zaten hesabın var mı?' : 'Hesabın yok mu?';
    document.getElementById('authError').style.display = 'none';
    document.getElementById('noticeBox').innerHTML = '';
  }

  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function submitAuth() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const btn = document.getElementById('authSubmit');

    if (!email || !password) { showAuthError('E-posta ve şifre gerekli.'); return; }

    btn.disabled = true;
    document.getElementById('authError').style.display = 'none';

    try {
      if (isRegister) {
        await supabase('POST', '/auth/v1/signup', {
          email, password,
          options: { emailRedirectTo: 'https://muzaffergil.github.io/todo-app/' }
        });
        document.getElementById('authForm').style.display = 'none';
        document.getElementById('authSwitchText').style.display = 'none';
        document.getElementById('noticeBox').innerHTML = `
          <div class="notice">
            <strong>Onay maili gönderildi!</strong><br>
            <b>${escapeHtml(email)}</b> adresine bir onay maili gönderdik.
            Maildeki bağlantıya tıklayarak hesabını aktif et.
          </div>`;
      } else {
        const data = await supabase('POST', '/auth/v1/token?grant_type=password', { email, password });
        saveSession(data);
        showApp(data);
      }
    } catch (e) {
      showAuthError(translateError(e.message));
    } finally {
      btn.disabled = false;
    }
  }

  function translateError(msg) {
    if (/invalid login/i.test(msg)) return 'E-posta veya şifre hatalı.';
    if (/email not confirmed/i.test(msg)) return 'E-posta adresin henüz onaylanmadı. Lütfen mailine bak.';
    if (/already registered/i.test(msg)) return 'Bu e-posta adresi zaten kayıtlı.';
    if (/weak password/i.test(msg)) return 'Şifre en az 6 karakter olmalı.';
    return msg;
  }

  async function logout() {
    try { await supabase('POST', '/auth/v1/logout', {}, session?.access_token); } catch {}
    saveSession(null);
    todos = [];
    document.getElementById('appBox').style.display = 'none';
    document.getElementById('authBox').style.display = 'block';
    document.getElementById('authForm').style.display = 'block';
    document.getElementById('authSwitchText').style.display = 'inline';
    document.getElementById('noticeBox').innerHTML = '';
    document.getElementById('authEmail').value = '';
    document.getElementById('authPassword').value = '';
    if (isRegister) toggleMode();
  }

  function showApp(s) {
    document.getElementById('authBox').style.display = 'none';
    document.getElementById('appBox').style.display = 'block';
    document.getElementById('userEmail').textContent = s.user?.email || '';
    loadTodos();
  }

  /* ── handle confirmation redirect (hash tokens) ── */
  async function handleRedirect() {
    const hash = window.location.hash;
    if (!hash) return false;
    const params = new URLSearchParams(hash.replace(/^#/, ''));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');
    if (!accessToken) return false;

    window.history.replaceState(null, '', window.location.pathname);

    if (type === 'signup' || type === 'recovery' || type === 'magiclink') {
      const s = { access_token: accessToken, refresh_token: refreshToken, user: null };
      try {
        const user = await supabase('GET', '/auth/v1/user', null, accessToken);
        s.user = user;
      } catch {}
      saveSession(s);
      showApp(s);
      return true;
    }
    return false;
  }

  /* ── todos API ── */
  const TODOS_URL = `${SUPABASE_URL}/rest/v1/todos`;

  async function db(method, path = '', body = null) {
    const res = await fetch(TODOS_URL + path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'apikey': ANON_KEY,
        'Authorization': `Bearer ${session.access_token}`,
        'Prefer': 'return=representation'
      },
      body: body ? JSON.stringify(body) : null
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function loadTodos() {
    try {
      todos = await db('GET', '?order=created_at.desc');
      render();
    } catch (e) {
      showError('Veriler yüklenemedi.');
      document.getElementById('todoList').innerHTML = '<li class="empty">Yüklenemedi</li>';
    }
  }

  async function addTodo() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim();
    if (!text) return;
    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    try {
      const [created] = await db('POST', '', { text, done: false, user_id: session.user?.id });
      todos.unshift(created);
      input.value = '';
      render();
    } catch (e) {
      showError('Eklenemedi.');
    } finally {
      btn.disabled = false;
    }
  }

  async function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    const newDone = !todo.done;
    todo.done = newDone;
    render();
    try {
      await db('PATCH', `?id=eq.${id}`, { done: newDone });
    } catch {
      todo.done = !newDone;
      render();
      showError('Güncellenemedi.');
    }
  }

  async function deleteTodo(id) {
    const prev = [...todos];
    todos = todos.filter(t => t.id !== id);
    render();
    try {
      await db('DELETE', `?id=eq.${id}`);
    } catch {
      todos = prev;
      render();
      showError('Silinemedi.');
    }
  }

  async function clearDone() {
    const prev = [...todos];
    todos = todos.filter(t => !t.done);
    render();
    try {
      await db('DELETE', '?done=eq.true');
    } catch {
      todos = prev;
      render();
      showError('Silinemedi.');
    }
  }

  async function saveEdit(id, value) {
    const text = value.trim();
    const todo = todos.find(t => t.id === id);
    if (!todo || !text || text === todo.text) { render(); return; }
    const old = todo.text;
    todo.text = text;
    render();
    try {
      await db('PATCH', `?id=eq.${id}`, { text });
    } catch {
      todo.text = old;
      render();
      showError('Düzenlenemedi.');
    }
  }

  function showError(msg) {
    const bar = document.getElementById('errorBar');
    bar.textContent = msg;
    bar.style.display = 'block';
    setTimeout(() => bar.style.display = 'none', 4000);
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('todoList');
    const filtered = todos.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    list.innerHTML = filtered.length === 0
      ? '<li class="empty">Görev yok</li>'
      : filtered.map(t => `
        <li class="todo-item ${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
          <span class="todo-text">${escapeHtml(t.text)}</span>
          <input class="edit-input" value="${escapeHtml(t.text)}"
            onkeydown="handleEditKey(event,${t.id})"
            onblur="saveEdit(${t.id},this.value)">
          <button class="edit-btn" onclick="startEdit(${t.id})" title="Düzenle">✎</button>
          <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Sil">×</button>
        </li>`).join('');

    const remaining = todos.filter(t => !t.done).length;
    document.getElementById('remaining').textContent = `${remaining} görev kaldı`;
  }

  function startEdit(id) {
    document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('editing'));
    const btn = [...document.querySelectorAll('.edit-btn')]
      .find(b => b.getAttribute('onclick') === `startEdit(${id})`);
    if (!btn) return;
    const li = btn.closest('.todo-item');
    li.classList.add('editing');
    const inp = li.querySelector('.edit-input');
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
  }

  function handleEditKey(e, id) {
    if (e.key === 'Enter') saveEdit(id, e.target.value);
    else if (e.key === 'Escape') render();
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Enter key on auth form ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('authBox').style.display !== 'none') {
      submitAuth();
    }
  });

  /* ── Todo input Enter ── */
  document.getElementById('todoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  /* ── boot ── */
  (async () => {
    const redirected = await handleRedirect();
    if (redirected) return;
    const saved = loadSession();
    if (saved?.access_token) {
      try {
        const user = await supabase('GET', '/auth/v1/user', null, saved.access_token);
        saved.user = user;
        saveSession(saved);
        showApp(saved);
      } catch {
        saveSession(null);
      }
    }
  })();
</script>
</body>
</html>
