<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 24px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
    }

    .header p {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 4px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .filters {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      padding: 5px 12px;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .todo-list {
      list-style: none;
      min-height: 60px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    .todo-item:hover {
      background: #f9fafb;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #111827;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .edit-btn, .delete-btn {
      background: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 5px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
      color: #d1d5db;
    }

    .edit-btn:hover {
      color: #4f46e5;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .todo-item.editing .todo-text { display: none; }
    .todo-item:not(.editing) .edit-input { display: none; }

    .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid #4f46e5;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      color: #111827;
    }

    .footer {
      padding: 12px 20px;
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #9ca3af;
      cursor: pointer;
      text-decoration: underline;
    }

    .clear-btn:hover {
      color: #ef4444;
    }

    .empty {
      text-align: center;
      padding: 32px;
      color: #d1d5db;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Yapılacaklar</h1>
      <p id="date"></p>
    </div>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="200">
      <button onclick="addTodo()">Ekle</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Aktif</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer">
      <span id="remaining"></span>
      <button class="clear-btn" onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    document.getElementById('date').textContent = new Date().toLocaleDateString('tr-TR', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">Görev yok</li>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="todo-item ${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
            <span class="todo-text">${escapeHtml(t.text)}</span>
            <input class="edit-input" value="${escapeHtml(t.text)}"
              onkeydown="handleEditKey(event, ${t.id})"
              onblur="saveEdit(${t.id}, this.value)">
            <button class="edit-btn" onclick="startEdit(${t.id})" title="Düzenle">✎</button>
            <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Sil">×</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('remaining').textContent = `${remaining} görev kaldı`;
    }

    function startEdit(id) {
      const items = document.querySelectorAll('.todo-item');
      items.forEach(item => item.classList.remove('editing'));
      // find the rendered li by matching the edit-btn's onclick
      const btn = [...document.querySelectorAll('.edit-btn')]
        .find(b => b.getAttribute('onclick') === `startEdit(${id})`);
      if (!btn) return;
      const li = btn.closest('.todo-item');
      li.classList.add('editing');
      const input = li.querySelector('.edit-input');
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }

    function saveEdit(id, value) {
      const text = value.trim();
      const todo = todos.find(t => t.id === id);
      if (todo && text && text !== todo.text) {
        todo.text = text;
        save();
      }
      render();
    }

    function handleEditKey(e, id) {
      if (e.key === 'Enter') {
        saveEdit(id, e.target.value);
      } else if (e.key === 'Escape') {
        render();
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
